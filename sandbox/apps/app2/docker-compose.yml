# ============================================================
# docker-compose.yml — Savanna Park Zoo frontend container
#
# Extends the root mini-baas stack by adding an nginx container
# that serves the built Vite app and seeds the database.
#
# Usage:  docker compose up -d          (from sandbox/apps/app2/)
#         docker compose down
# ============================================================

services:
  zoo-frontend:
    image: nginx:1.27-alpine
    container_name: zoo-frontend
    ports:
      - "${ZOO_PORT:-5180}:80"
    volumes:
      - ./front/dist:/usr/share/nginx/html:ro
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mini-baas
    restart: unless-stopped

networks:
  mini-baas:
    external: true
    name: mini-baas_mini-baas
