# File: .github/workflows/cd.yml
# CD — Continuous Deployment via ArgoCD image updater pattern
# On push to main: builds images, updates image tags in K8s values,
# commits back to trigger ArgoCD sync.
name: CD

on:
  push:
    branches: [main]
    paths:
      - "docker/services/**"
      - "k8s/**"

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false # Never cancel a deploy

env:
  REGISTRY: ghcr.io/univers42/mini-baas

permissions:
  contents: write
  packages: write

jobs:
  # ─── Build & Push Images with SHA Tag ──────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: meta
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build & push all images
        uses: docker/bake-action@v4
        with:
          files: docker-bake.hcl
          push: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
        env:
          TAG: ${{ steps.meta.outputs.tag }}

  # ─── Update K8s Manifests with New Image Tags ──────────────────
  update-manifests:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tags in values.yaml
        env:
          TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          VALUES="k8s/charts/mini-baas/values.yaml"
          # Update all custom-built service image tags
          yq -i ".mongoApi.image.tag = \"${TAG}\"" "$VALUES"
          yq -i ".adapterRegistry.image.tag = \"${TAG}\"" "$VALUES"
          yq -i ".queryRouter.image.tag = \"${TAG}\"" "$VALUES"

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "chore(k8s): update image tags to ${{ needs.build-and-push.outputs.image-tag }} [skip ci]"
            git push
          fi

  # ─── Deploy to Production (manual gate) ────────────────────────
  deploy-prod:
    runs-on: ubuntu-latest
    needs: [update-manifests]
    environment: production # Requires manual approval
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # Get the latest with updated tags

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/download/v2.13.3/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Trigger ArgoCD sync
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app sync mini-baas \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_AUTH_TOKEN" \
            --grpc-web \
            --prune \
            --timeout 300
          argocd app wait mini-baas \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_AUTH_TOKEN" \
            --grpc-web \
            --timeout 300
