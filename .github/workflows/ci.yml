# File: .github/workflows/ci.yml
# CI pipeline — static analysis, parallel builds, integration tests
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # ─── Job 1: Static Analysis (no Docker needed) ─────────────────
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Validate shell syntax
        run: |
          set -euo pipefail
          find scripts -type f -name '*.sh' -print0 | xargs -0 bash -n

      - name: Run shellcheck
        run: |
          set -euo pipefail
          find scripts -type f -name '*.sh' -print0 | xargs -0 shellcheck -S error -e SC1091

      - name: Dockerfile linting
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: warning

      - name: Secret scanning
        run: bash scripts/check-secrets.sh

  # ─── Job 2: Build Images (parallel via matrix) ─────────────────
  build-images:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: static-analysis
    strategy:
      fail-fast: false
      matrix:
        service: [kong, mongo-api, adapter-registry, query-router]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./docker/services/${{ matrix.service }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # ─── Job 3: Integration Tests ──────────────────────────────────
  integration-tests:
    name: Compose Integration Tests
    runs-on: ubuntu-latest
    needs: build-images
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Generate CI environment
        run: bash scripts/generate-env.sh .env

      - name: Build and start stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml build
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

      - name: Wait for gateway health
        run: |
          set -euo pipefail
          APIKEY=$(grep KONG_PUBLIC_API_KEY .env | cut -d= -f2)
          for i in $(seq 1 45); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' \
              http://localhost:8000/auth/v1/health \
              -H "apikey: $APIKEY" || true)
            if [ "$code" = "200" ]; then
              echo "Gateway ready after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "Gateway health check failed"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --tail=50
          exit 1

      - name: Run phase test suite
        env:
          FORCE_COLORS: "0"
        run: make tests

      - name: Capture compose logs
        if: always()
        run: |
          mkdir -p artifacts
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps > artifacts/compose-ps.txt
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color > artifacts/compose-logs.txt

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ github.run_id }}
          path: artifacts/
          retention-days: 7

      - name: Teardown stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
