name: mini-baas
version: '3.9'

# todo: add description to services
# 
# Build Optimization Tips:
# - All images use Alpine Linux to minimize size
# - Services utilize multistage builds where possible
# - .dockerignore files prevent unnecessary context copying
# - Non-root users improve security
#
# To build custom services, use:
#   docker compose build [service-name]
#   docker compose build --no-cache [service-name]

services:
  trino:
    image: trinodb/trino
    container_name: mini-baas-trino
    ports:
      - "8080:8080"
    networks:
      - mini-baas
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: mini-baas-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mini-baas
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo:
    image: mongo:7
    container_name: mini-baas-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - mini-baas
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  gotrue:
    image: supabase/gotrue:v2.188.1
    container_name: mini-baas-gotrue
    ports:
      - "9999:9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:9999}
      GOTRUE_SITE_URL: ${GOTRUE_SITE_URL:-http://localhost:3001}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/postgres}
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-chars}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mini-baas
    restart: unless-stopped

  postgrest:
    image: postgrest/postgrest:devel
    container_name: mini-baas-postgrest
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: ${PGRST_DB_URI:-postgres://postgres:postgres@postgres:5432/postgres}
      PGRST_DB_SCHEMA: ${PGRST_DB_SCHEMA:-public}
      PGRST_DB_ANON_ROLE: ${PGRST_DB_ANON_ROLE:-postgres}
      PGRST_SERVER_PORT: 3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mini-baas
    restart: unless-stopped

  realtime:
    image: supabase/realtime
    container_name: mini-baas-realtime
    ports:
      - "4000:4000"
    environment:
      DB_HOST: ${REALTIME_DB_HOST:-postgres}
      DB_PORT: ${REALTIME_DB_PORT:-5432}
      DB_USER: ${REALTIME_DB_USER:-postgres}
      DB_PASSWORD: ${REALTIME_DB_PASSWORD:-postgres}
      DB_NAME: ${REALTIME_DB_NAME:-postgres}
      PORT: 4000
      APP_NAME: ${REALTIME_APP_NAME:-realtime-dev}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-super-secret-key-base}
      METRICS_JWT_SECRET: ${METRICS_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-chars}
      API_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-chars}
      DASHBOARD_USER: ${REALTIME_DASHBOARD_USER:-supabase}
      DASHBOARD_PASSWORD: ${REALTIME_DASHBOARD_PASSWORD:-this_is_insecure_change_me}
      ERL_AFLAGS: "-proto_dist inet_tcp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mini-baas
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-sS", "-o", "/dev/null", "http://localhost:4000/" ]
      timeout: 5s
      interval: 5s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: mini-baas-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - mini-baas
    restart: unless-stopped

  redis:
    image: redis:trixie
    container_name: mini-baas-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - mini-baas
    restart: unless-stopped

  supavisor:
    image: supabase/supavisor:2.7.4
    container_name: mini-baas-supavisor
    ports:
      - "6543:6543"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/postgres}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-super-secret-key-base}
      VAULT_ENC_KEY: ${VAULT_ENC_KEY:-0123456789abcdef0123456789abcdef}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mini-baas
    restart: unless-stopped

  studio:
    image: supabase/studio
    container_name: mini-baas-studio
    ports:
      - "3001:3000"
    environment:
      STUDIO_PG_META_URL: ${STUDIO_PG_META_URL:-http://host.docker.internal:8080}
      SUPABASE_URL: ${SUPABASE_URL:-http://localhost:9999}
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:9999}
      SUPABASE_ANON_KEY: ${ANON_KEY:-anon-key-placeholder}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY:-service-key-placeholder}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mini-baas
    restart: unless-stopped

networks:
  mini-baas:
    driver: bridge

volumes:
  minio-data:
  redis-data:
  postgres-data:
  mongo-data:
