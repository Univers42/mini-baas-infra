name: mini-baas

services:
  trino:
    image: trinodb/trino
    container_name: mini-baas-trino
    ports:
      - "8080:8080"
    networks:
      - mini-baas
    restart: unless-stopped

  gotrue:
    image: supabase/gotrue:v2.188.1
    container_name: mini-baas-gotrue
    ports:
      - "9999:9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_SITE_URL: ${GOTRUE_SITE_URL:-http://localhost:3001}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@host.docker.internal:5432/postgres}
      GOTRUE_JWT_SECRET: ${GOTRUE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-chars}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mini-baas
    restart: unless-stopped

  postgrest:
    image: postgrest/postgrest:devel
    container_name: mini-baas-postgrest
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: ${PGRST_DB_URI:-postgres://postgres:postgres@host.docker.internal:5432/postgres}
      PGRST_DB_SCHEMA: ${PGRST_DB_SCHEMA:-public}
      PGRST_DB_ANON_ROLE: ${PGRST_DB_ANON_ROLE:-postgres}
      PGRST_SERVER_PORT: 3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mini-baas
    restart: unless-stopped

  realtime:
    image: supabase/realtime
    container_name: mini-baas-realtime
    ports:
      - "4000:4000"
    environment:
      DB_HOST: ${REALTIME_DB_HOST:-host.docker.internal}
      DB_PORT: ${REALTIME_DB_PORT:-5432}
      DB_USER: ${REALTIME_DB_USER:-postgres}
      DB_PASSWORD: ${REALTIME_DB_PASSWORD:-postgres}
      DB_NAME: ${REALTIME_DB_NAME:-postgres}
      PORT: 4000
      SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE:-super-secret-key-base}
      ERL_AFLAGS: "-proto_dist inet_tcp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mini-baas
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: mini-baas-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - mini-baas
    restart: unless-stopped

  redis:
    image: redis:trixie
    container_name: mini-baas-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - mini-baas
    restart: unless-stopped

  supavisor:
    image: supabase/supavisor:2.7.4
    container_name: mini-baas-supavisor
    ports:
      - "6543:6543"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@host.docker.internal:5432/postgres}
      SECRET_KEY_BASE: ${SUPAVISOR_SECRET_KEY_BASE:-super-secret-key-base}
      VAULT_ENC_KEY: ${SUPAVISOR_VAULT_ENC_KEY:-0123456789abcdef0123456789abcdef}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mini-baas
    restart: unless-stopped

  studio:
    image: supabase/studio
    container_name: mini-baas-studio
    ports:
      - "3001:3000"
    environment:
      STUDIO_PG_META_URL: ${STUDIO_PG_META_URL:-http://host.docker.internal:8080}
      SUPABASE_URL: ${SUPABASE_URL:-http://localhost:9999}
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:9999}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-anon-key-placeholder}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-service-key-placeholder}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mini-baas
    restart: unless-stopped

networks:
  mini-baas:
    driver: bridge

volumes:
  minio-data:
  redis-data:
