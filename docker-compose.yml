name: mini-baas

# todo: add description to services
# 
# Build Optimization Tips:
# - All images use Alpine Linux to minimize size
# - Services utilize multistage builds where possible
# - .dockerignore files prevent unnecessary context copying
# - Non-root users improve security
#
# To build custom services, use:
#   docker compose build [service-name]
#   docker compose build --no-cache [service-name]

services:
  kong:
    image: ${KONG_IMAGE:-kong:3.8}
    container_name: mini-baas-kong
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      KONG_DATABASE: off
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./deployments/base/kong/kong.yml:/etc/kong/kong.yml:ro
    depends_on:
      gotrue:
        condition: service_started
      postgrest:
        condition: service_started
      realtime:
        condition: service_started
      studio:
        condition: service_started
      trino:
        condition: service_started
    networks:
      - mini-baas
    restart: unless-stopped

  trino:
    build:
      context: ./deployments/base/trino
      dockerfile: Dockerfile
    container_name: mini-baas-trino
    ports:
      - "8080:8080"
    volumes:
      - ./deployments/base/trino/config.properties:/etc/trino/config.properties:ro
    networks:
      - mini-baas
    restart: unless-stopped

  postgres:
    build:
      context: ./deployments/base/postgres
      dockerfile: Dockerfile
    container_name: mini-baas-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      mini-baas:
        aliases:
          - db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 20

  db-bootstrap:
    build:
      context: ./deployments/base/postgres
      dockerfile: Dockerfile
    container_name: mini-baas-db-bootstrap
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      REALTIME_DB_NAME: realtime
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    command: >
      sh -ec '
        until pg_isready -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"; do sleep 1; done;
        psql -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -v ON_ERROR_STOP=1 -v pwd="$${POSTGRES_PASSWORD}" -v realtime_db="$${REALTIME_DB_NAME}" -f /bootstrap/db-bootstrap.sql;
      '
    volumes:
      - ./scripts/db-bootstrap.sql:/bootstrap/db-bootstrap.sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mini-baas
    restart: "no"

  mongo:
    build:
      context: ./deployments/base/mongo
      dockerfile: Dockerfile
    container_name: mini-baas-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - mini-baas
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  gotrue:
    build:
      context: ./deployments/base/gotrue
      dockerfile: Dockerfile
    container_name: mini-baas-gotrue
    ports:
      - "9999:9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8000/auth/v1}
      GOTRUE_SITE_URL: ${GOTRUE_SITE_URL:-http://localhost:3001}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/postgres}
      GOTRUE_MAILER_AUTOCONFIRM: true
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      # GOTRUE_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-chars}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
    networks:
      - mini-baas
    restart: unless-stopped

  postgrest:
    build:
      context: ./deployments/base/postgrest
      dockerfile: Dockerfile
    container_name: mini-baas-postgrest
    ports:
      - "3002:3000"
    environment:
      PGRST_DB_URI: ${PGRST_DB_URI:-postgres://postgres:postgres@postgres:5432/postgres}
      PGRST_DB_SCHEMA: ${PGRST_DB_SCHEMA:-public}
      # PGRST_DB_ANON_ROLE: ${PGRST_DB_ANON_ROLE:-postgres}
      PGRST_SERVER_PORT: 3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mini-baas
    restart: unless-stopped

  pg-meta:
    build:
      context: ./deployments/base/pg-meta
      dockerfile: Dockerfile
    container_name: mini-baas-pg-meta
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: ${PG_META_DB_HOST:-postgres}
      PG_META_DB_PORT: ${PG_META_DB_PORT:-${POSTGRES_PORT:-5432}}
      PG_META_DB_NAME: ${PG_META_DB_NAME:-${POSTGRES_DB:-postgres}}
      PG_META_DB_USER: ${PG_META_DB_USER:-${POSTGRES_USER:-postgres}}
      PG_META_DB_PASSWORD: ${PG_META_DB_PASSWORD:-${POSTGRES_PASSWORD:-postgres}}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mini-baas
    restart: unless-stopped

  realtime:
    build:
      context: ./deployments/base/realtime
      dockerfile: Dockerfile
    container_name: mini-baas-realtime
    ports:
      - "4000:4000"
    environment:
      DB_HOST: ${REALTIME_DB_HOST:-postgres}
      DB_PORT: ${REALTIME_DB_PORT:-5432}
      DB_USER: ${REALTIME_DB_USER:-postgres}
      DB_PASSWORD: ${REALTIME_DB_PASSWORD:-postgres}
      DB_NAME: realtime
      PORT: 4000
      APP_NAME: ${REALTIME_APP_NAME:-realtime-dev}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-super-secret-key-base}
      METRICS_JWT_SECRET: ${METRICS_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-chars}
      API_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-chars}
      DASHBOARD_USER: ${REALTIME_DASHBOARD_USER:-supabase}
      DASHBOARD_PASSWORD: ${REALTIME_DASHBOARD_PASSWORD:-this_is_insecure_change_me}
      ERL_AFLAGS: "-proto_dist inet_tcp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
    networks:
      - mini-baas
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-sS", "-o", "/dev/null", "http://localhost:4000/" ]
      timeout: 5s
      interval: 5s
      retries: 3

  minio:
    build:
      context: ./deployments/base/minio
      dockerfile: Dockerfile
    container_name: mini-baas-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - mini-baas
    restart: unless-stopped

  redis:
    build:
      context: ./deployments/base/redis
      dockerfile: Dockerfile
    container_name: mini-baas-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - mini-baas
    restart: unless-stopped

  supavisor:
    build:
      context: ./deployments/base/supavisor
      dockerfile: Dockerfile
    container_name: mini-baas-supavisor
    ports:
      - "6543:6543"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/postgres}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-super-secret-key-base}
      VAULT_ENC_KEY: ${VAULT_ENC_KEY:-0123456789abcdef0123456789abcdef}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mini-baas
    restart: unless-stopped

  studio:
    build:
      context: ./deployments/base/studio
      dockerfile: Dockerfile
    container_name: mini-baas-studio
    ports:
      - "3001:3000"
    environment:
      HOSTNAME: 0.0.0.0
      STUDIO_PG_META_URL: http://pg-meta:8080
      SUPABASE_URL: ${SUPABASE_URL:-http://localhost:8000}
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:8000}
      SUPABASE_ANON_KEY: ${ANON_KEY:-anon-key-placeholder}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY:-service-key-placeholder}
    depends_on:
      pg-meta:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mini-baas
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(() => process.exit(0)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  mini-baas:
    driver: bridge

volumes:
  minio-data:
  redis-data:
  postgres-data:
  mongo-data:
