# File: docker-compose.yml
name: mini-baas

# Build Optimization Tips:
# - All images use Alpine Linux to minimize size
# - Services utilize multistage builds where possible
# - .dockerignore files prevent unnecessary context copying
# - Non-root users improve security

services:
  # ─── API Gateway ─────────────────────────────────────────────────
  kong:
    image: ${KONG_IMAGE:-kong:3.8}
    container_name: mini-baas-kong
    ports:
      - "${KONG_HTTP_PORT:-8000}:8000"
      - "${KONG_ADMIN_PORT:-8001}:8001"
    environment:
      KONG_DATABASE: off
      KONG_DECLARATIVE_CONFIG: /tmp/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PUBLIC_API_KEY: ${KONG_PUBLIC_API_KEY:-public-anon-key}
      KONG_SERVICE_API_KEY: ${KONG_SERVICE_API_KEY:-service-role-key}
      KONG_CORS_ORIGIN_APP: ${KONG_CORS_ORIGIN_APP:-http://localhost:3000}
      KONG_CORS_ORIGIN_PLAYGROUND: ${KONG_CORS_ORIGIN_PLAYGROUND:-http://localhost:3100}
      KONG_CORS_ORIGIN_STUDIO: ${KONG_CORS_ORIGIN_STUDIO:-http://localhost:3001}
    volumes:
      - ./docker/services/kong/conf/kong.yml:/etc/kong/kong.yml.tmpl:ro
    command: >
      sh -ec '
        sed \
          -e "s|__KONG_PUBLIC_API_KEY__|$${KONG_PUBLIC_API_KEY}|g" \
          -e "s|__KONG_SERVICE_API_KEY__|$${KONG_SERVICE_API_KEY}|g" \
          -e "s|__KONG_CORS_ORIGIN_APP__|$${KONG_CORS_ORIGIN_APP}|g" \
          -e "s|__KONG_CORS_ORIGIN_PLAYGROUND__|$${KONG_CORS_ORIGIN_PLAYGROUND}|g" \
          -e "s|__KONG_CORS_ORIGIN_STUDIO__|$${KONG_CORS_ORIGIN_STUDIO}|g" \
          /etc/kong/kong.yml.tmpl > /tmp/kong.yml;
        exec /docker-entrypoint.sh kong docker-start
      '
    depends_on:
      gotrue:
        condition: service_started
      postgrest:
        condition: service_started
      mongo-api:
        condition: service_started
      realtime:
        condition: service_started
      trino:
        condition: service_started
    networks:
      - mini-baas
    restart: unless-stopped

  # ─── SQL Federation ──────────────────────────────────────────────
  trino:
    image: trinodb/trino:467
    container_name: mini-baas-trino
    ports:
      - "${TRINO_PORT:-8080}:8080"
    volumes:
      - ./docker/services/trino/conf/config.properties:/etc/trino/config.properties:ro
    networks:
      - mini-baas
    restart: unless-stopped

  # ─── Relational Database ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mini-baas-postgres
    ports:
      - "${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      mini-baas:
        aliases:
          - db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 20

  # ─── Database Bootstrap ──────────────────────────────────────────
  db-bootstrap:
    image: postgres:16-alpine
    container_name: mini-baas-db-bootstrap
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      REALTIME_DB_NAME: realtime
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    command: >
      sh -ec '
        until pg_isready -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"; do sleep 1; done;
        psql -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -v ON_ERROR_STOP=1 -v pwd="$${POSTGRES_PASSWORD}" -v realtime_db="$${REALTIME_DB_NAME}" -f /bootstrap/db-bootstrap.sql;
      '
    volumes:
      - ./scripts/db-bootstrap.sql:/bootstrap/db-bootstrap.sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mini-baas
    restart: "no"

  # ─── Document Database ───────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: mini-baas-mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - mini-baas
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ─── MongoDB REST API ───────────────────────────────────────────
  mongo-api:
    build:
      context: ./docker/services/mongo-api
      dockerfile: Dockerfile
    container_name: mini-baas-mongo-api
    environment:
      PORT: 3010
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: ${MONGO_DB_NAME:-mini_baas}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - mini-baas
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3010/health/live || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  # ─── Authentication ──────────────────────────────────────────────
  gotrue:
    image: supabase/gotrue:v2.188.1
    container_name: mini-baas-gotrue
    ports:
      - "${GOTRUE_PORT:-9999}:9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8000/auth/v1}
      GOTRUE_SITE_URL: ${GOTRUE_SITE_URL:-http://localhost:3001}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/postgres}
      GOTRUE_MAILER_AUTOCONFIRM: true
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
    networks:
      - mini-baas
    restart: unless-stopped

  # ─── PostgreSQL REST API ─────────────────────────────────────────
  postgrest:
    image: postgrest/postgrest:v12.2.3
    container_name: mini-baas-postgrest
    ports:
      - "${POSTGREST_PORT:-3002}:3000"
    environment:
      PGRST_DB_URI: ${PGRST_DB_URI:-postgres://postgres:postgres@postgres:5432/postgres}
      PGRST_DB_SCHEMA: ${PGRST_DB_SCHEMA:-public}
      PGRST_SERVER_PORT: 3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
    networks:
      - mini-baas
    restart: unless-stopped

  # ─── PostgreSQL Metadata ─────────────────────────────────────────
  pg-meta:
    image: supabase/postgres-meta:v0.91.0
    container_name: mini-baas-pg-meta
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: ${PG_META_DB_HOST:-postgres}
      PG_META_DB_PORT: ${PG_META_DB_PORT:-${POSTGRES_PORT:-5432}}
      PG_META_DB_NAME: ${PG_META_DB_NAME:-${POSTGRES_DB:-postgres}}
      PG_META_DB_USER: ${PG_META_DB_USER:-${POSTGRES_USER:-postgres}}
      PG_META_DB_PASSWORD: ${PG_META_DB_PASSWORD:-${POSTGRES_PASSWORD:-postgres}}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mini-baas
    restart: unless-stopped

  # ─── Realtime / WebSocket ────────────────────────────────────────
  realtime:
    image: supabase/realtime:v2.33.70
    container_name: mini-baas-realtime
    ports:
      - "${REALTIME_PORT:-4000}:4000"
    environment:
      DB_HOST: ${REALTIME_DB_HOST:-postgres}
      DB_PORT: ${REALTIME_DB_PORT:-5432}
      DB_USER: ${REALTIME_DB_USER:-postgres}
      DB_PASSWORD: ${REALTIME_DB_PASSWORD:-postgres}
      DB_NAME: realtime
      PORT: 4000
      APP_NAME: ${REALTIME_APP_NAME:-realtime-dev}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-super-secret-key-base}
      METRICS_JWT_SECRET: ${METRICS_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-chars}
      API_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-chars}
      DASHBOARD_USER: ${REALTIME_DASHBOARD_USER:-supabase}
      DASHBOARD_PASSWORD: ${REALTIME_DASHBOARD_PASSWORD:-this_is_insecure_change_me}
      ERL_AFLAGS: "-proto_dist inet_tcp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
    networks:
      - mini-baas
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-sS", "-o", "/dev/null", "http://localhost:4000/" ]
      timeout: 5s
      interval: 5s
      retries: 3

  # ─── Object Storage ──────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: mini-baas-minio
    profiles: [extras]
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - mini-baas
    restart: unless-stopped

  # ─── In-Memory Cache ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mini-baas-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - mini-baas
    restart: unless-stopped

  # ─── Connection Pooler ───────────────────────────────────────────
  supavisor:
    image: supabase/supavisor:2.7.4
    container_name: mini-baas-supavisor
    profiles: [extras]
    ports:
      - "${SUPAVISOR_PORT:-6543}:6543"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/postgres}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-super-secret-key-base}
      VAULT_ENC_KEY: ${VAULT_ENC_KEY:-0123456789abcdef0123456789abcdef}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mini-baas
    restart: unless-stopped

  # ─── Admin Dashboard ─────────────────────────────────────────────
  studio:
    image: supabase/studio:2026.03.30-sha-12a43e5
    container_name: mini-baas-studio
    profiles: [extras]
    ports:
      - "${STUDIO_PORT:-3001}:3000"
    environment:
      HOSTNAME: 0.0.0.0
      STUDIO_PG_META_URL: http://pg-meta:8080
      SUPABASE_URL: ${SUPABASE_URL:-http://localhost:8000}
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:8000}
      SUPABASE_ANON_KEY: ${ANON_KEY:-anon-key-placeholder}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY:-service-key-placeholder}
    depends_on:
      pg-meta:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mini-baas
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(() => process.exit(0)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Adapter Registry (DB credential store) ─────────────────────
  adapter-registry:
    build:
      context: ./docker/services/adapter-registry
      dockerfile: Dockerfile
    container_name: mini-baas-adapter-registry
    environment:
      PORT: 3020
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/postgres}
      JWT_SECRET: ${JWT_SECRET}
      VAULT_ENC_KEY: ${VAULT_ENC_KEY:-0123456789abcdef0123456789abcdef}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
    networks:
      - mini-baas
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3020/health/live || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  # ─── Query Router (universal data plane) ─────────────────────────
  query-router:
    build:
      context: ./docker/services/query-router
      dockerfile: Dockerfile
    container_name: mini-baas-query-router
    environment:
      PORT: 4001
      ADAPTER_REGISTRY_URL: http://adapter-registry:3020
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      adapter-registry:
        condition: service_healthy
    networks:
      - mini-baas
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/health/live || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  # ─── Observability: Prometheus ───────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: mini-baas-prometheus
    profiles: ["observability"]
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - mini-baas
    restart: unless-stopped

  # ─── Observability: Grafana ──────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: mini-baas-grafana
    profiles: ["observability"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3030:3000"
    networks:
      - mini-baas
    restart: unless-stopped

  # ─── Observability: Loki ─────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: mini-baas-loki
    profiles: ["observability"]
    volumes:
      - ./config/loki/loki.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    command: ["-config.file=/etc/loki/config.yaml"]
    networks:
      - mini-baas
    restart: unless-stopped

  # ─── Observability: Promtail ─────────────────────────────────────
  promtail:
    image: grafana/promtail:3.0.0
    container_name: mini-baas-promtail
    profiles: ["observability"]
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/promtail/promtail.yaml:/etc/promtail/config.yaml:ro
    command: ["-config.file=/etc/promtail/config.yaml"]
    networks:
      - mini-baas
    restart: unless-stopped

  # ─── Playground Frontend ─────────────────────────────────────────
  playground:
    image: nginx:1.27-alpine
    container_name: mini-baas-playground
    profiles: ["playground"]
    ports:
      - "3100:80"
    volumes:
      - ./playground:/usr/share/nginx/html
      - ./playground/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./vendor/libcss/dist/css/libcss.min.css:/usr/share/nginx/html/libcss.min.css:ro
    depends_on:
      kong:
        condition: service_started
    networks:
      - mini-baas
    restart: unless-stopped

networks:
  mini-baas:
    driver: bridge

volumes:
  minio-data:
  redis-data:
  postgres-data:
  mongo-data:
  prometheus-data:
  grafana-data:
  loki-data:
