# File: k8s/overlays/prod/values-mongodb.yaml
# Prod overrides for bitnami/mongodb
architecture: replicaset
replicaCount: 3

auth:
  enabled: true
  existingSecret: "mini-baas-secrets"

persistence:
  size: 50Gi

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
