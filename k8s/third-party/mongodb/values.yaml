# File: k8s/third-party/mongodb/values.yaml
# Bitnami MongoDB Helm chart values for mini-BaaS
# Chart: bitnami/mongodb  Version: 16.4.x
# Docs: https://github.com/bitnami/charts/tree/main/bitnami/mongodb
#
# IMPORTANT: This deploys as a 3-member replica set, which enables
# MongoDB change streams — required by the realtime engine.

architecture: replicaset
replicaCount: 3

auth:
  enabled: false # No auth in dev; enable in prod overlay

persistence:
  enabled: true
  size: 8Gi
  storageClass: ""

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# The realtime engine connects to mongodb-headless:27017
service:
  type: ClusterIP
  ports:
    mongodb: 27017

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
