# File: k8s/argocd/application.yaml
# ArgoCD Application CRD — manages the mini-baas Helm release
# Install: kubectl apply -f k8s/argocd/application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mini-baas
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: mini-baas
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Univers42/mini-baas-infra.git
    targetRevision: main
    path: k8s/charts/mini-baas
    helm:
      releaseName: mini-baas
      valueFiles:
        - values.yaml
        - ../../overlays/prod/values-mini-baas.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: mini-baas

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Health checks for custom resources
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas # Ignore — managed by HPA
