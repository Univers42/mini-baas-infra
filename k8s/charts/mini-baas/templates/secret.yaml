{{/* File: k8s/charts/mini-baas/templates/secret.yaml */}}
{{/*
  This Secret is a placeholder. In production, manage it with:
    - SOPS-encrypted YAML committed to git  (ArgoCD decrypts at sync)
    - External Secrets Operator  (pulls from Vault/AWS SM)
    - kubectl create secret generic mini-baas-secrets ...

  Values shown here are dev-only defaults. Never commit real secrets.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.secretName }}
  labels:
    {{- include "mini-baas.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: "replace-with-32-plus-char-secret"
  postgres-password: "postgres"
  postgres-url: "postgres://postgres:postgres@postgresql:5432/postgres"
  vault-enc-key: "0123456789abcdef0123456789abcdef"
  kong-public-api-key: "public-anon-key"
  kong-service-api-key: "service-role-key"
  minio-root-user: "minioadmin"
  minio-root-password: "minioadmin"
  anon-key: "anon-key-placeholder"
  service-role-key: "service-key-placeholder"
  secret-key-base: "super-secret-key-base-replace-in-prod"
