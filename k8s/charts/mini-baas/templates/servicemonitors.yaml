{{/* File: k8s/charts/mini-baas/templates/servicemonitors.yaml */}}
{{/*
  Prometheus ServiceMonitor CRDs for custom application services.
  These are picked up by kube-prometheus-stack's Prometheus instance
  because serviceMonitorSelectorNilUsesHelmValues: false is set.
  Requires monitoring.coreos.com/v1 CRDs (kube-prometheus-stack).
  Gate behind global.monitoring.enabled to avoid errors when CRDs are absent.
*/}}

{{- if and (default false .Values.global.monitoring) .Values.mongoApi.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "mini-baas.fullname" . }}-mongo-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mini-baas.labels" . | nindent 4 }}
    app.kubernetes.io/name: mongo-api
spec:
  selector:
    matchLabels:
      {{- include "mini-baas.selectorLabels" (dict "name" "mongo-api" "release" .Release.Name) | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
{{- end }}
---
