{{/* File: k8s/charts/mini-baas/templates/job-db-bootstrap.yaml */}}
{{- if .Values.dbBootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "mini-baas.fullname" . }}-db-bootstrap
  labels:
    {{- include "mini-baas.labels" . | nindent 4 }}
  annotations:
    # Re-run on every helm upgrade to ensure idempotent bootstrap
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-bootstrap
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.dbBootstrap.image.repository }}:{{ .Values.dbBootstrap.image.tag }}"
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgresql -U postgres -d postgres; do
                echo "Waiting for PostgreSQL…"
                sleep 2
              done
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 50m, memory: 32Mi }
      containers:
        - name: bootstrap
          image: "{{ .Values.dbBootstrap.image.repository }}:{{ .Values.dbBootstrap.image.tag }}"
          command:
            - sh
            - -c
            - |
              psql -h postgresql -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
                -v ON_ERROR_STOP=1 \
                -v pwd="$POSTGRES_PASSWORD" \
                -v realtime_db="realtime" \
                -f /bootstrap/db-bootstrap.sql
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_DB
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretName }}
                  key: postgres-password
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretName }}
                  key: postgres-password
          volumeMounts:
            - name: bootstrap-sql
              mountPath: /bootstrap
              readOnly: true
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { cpu: 100m, memory: 64Mi }
      volumes:
        - name: bootstrap-sql
          configMap:
            name: {{ include "mini-baas.fullname" . }}-db-bootstrap
{{- end }}
