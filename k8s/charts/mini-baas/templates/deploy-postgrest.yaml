{{/* File: k8s/charts/mini-baas/templates/deploy-postgrest.yaml */}}
{{- if .Values.postgrest.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mini-baas.fullname" . }}-postgrest
  labels:
    {{- include "mini-baas.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgrest
spec:
  replicas: {{ .Values.postgrest.replicas }}
  selector:
    matchLabels:
      {{- include "mini-baas.selectorLabels" (dict "name" "postgrest" "release" .Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mini-baas.selectorLabels" (dict "name" "postgrest" "release" .Release.Name) | nindent 8 }}
    spec:
      containers:
        - name: postgrest
          image: "{{ .Values.images.postgrest.repository }}:{{ .Values.images.postgrest.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.postgrest.port }}
              protocol: TCP
          env:
            {{- range $k, $v := .Values.postgrest.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: PGRST_DB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretName }}
                  key: postgres-url
            - name: PGRST_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretName }}
                  key: jwt-secret
          resources:
            {{- toYaml .Values.postgrest.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.postgrest.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.postgrest.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mini-baas.fullname" . }}-postgrest
  labels:
    {{- include "mini-baas.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgrest.port }}
      name: http
      targetPort: {{ .Values.postgrest.port }}
      protocol: TCP
  selector:
    {{- include "mini-baas.selectorLabels" (dict "name" "postgrest" "release" .Release.Name) | nindent 4 }}
{{- end }}
