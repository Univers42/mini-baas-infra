{{/* File: k8s/charts/mini-baas/templates/deploy-studio.yaml */}}
{{- if .Values.studio.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mini-baas.fullname" . }}-studio
  labels:
    {{- include "mini-baas.labels" . | nindent 4 }}
    app.kubernetes.io/name: studio
spec:
  replicas: {{ .Values.studio.replicas }}
  selector:
    matchLabels:
      {{- include "mini-baas.selectorLabels" (dict "name" "studio" "release" .Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mini-baas.selectorLabels" (dict "name" "studio" "release" .Release.Name) | nindent 8 }}
    spec:
      containers:
        - name: studio
          image: "{{ .Values.images.studio.repository }}:{{ .Values.images.studio.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.studio.port }}
              protocol: TCP
          env:
            {{- range $k, $v := .Values.studio.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: SUPABASE_URL
              value: "http://kong-kong-proxy:8000"
            - name: SUPABASE_PUBLIC_URL
              value: "http://kong-kong-proxy:8000"
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretName }}
                  key: anon-key
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretName }}
                  key: service-role-key
          resources:
            {{- toYaml .Values.studio.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.studio.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.studio.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mini-baas.fullname" . }}-studio
  labels:
    {{- include "mini-baas.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.studio.port }}
      name: http
      targetPort: {{ .Values.studio.port }}
      protocol: TCP
  selector:
    {{- include "mini-baas.selectorLabels" (dict "name" "studio" "release" .Release.Name) | nindent 4 }}
{{- end }}
