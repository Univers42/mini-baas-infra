{{/* File: k8s/charts/mini-baas/templates/deploy-playground.yaml */}}
{{- if .Values.playground.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mini-baas.fullname" . }}-playground-nginx
  labels:
    {{- include "mini-baas.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      # Proxy API calls to Kong gateway inside the cluster
      location /api/ {
        proxy_pass http://kong-kong-proxy.{{ .Release.Namespace }}.svc.cluster.local:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mini-baas.fullname" . }}-playground
  labels:
    {{- include "mini-baas.labels" . | nindent 4 }}
    app.kubernetes.io/name: playground
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "mini-baas.selectorLabels" (dict "name" "playground" "release" .Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mini-baas.selectorLabels" (dict "name" "playground" "release" .Release.Name) | nindent 8 }}
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.playground.image }}:{{ .Values.playground.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: playground-html
              mountPath: /usr/share/nginx/html
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 15
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 100m, memory: 64Mi }
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "mini-baas.fullname" . }}-playground-nginx
        - name: playground-html
          configMap:
            name: {{ include "mini-baas.fullname" . }}-playground-files
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mini-baas.fullname" . }}-playground
  labels:
    {{- include "mini-baas.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    {{- include "mini-baas.selectorLabels" (dict "name" "playground" "release" .Release.Name) | nindent 4 }}
{{- end }}
