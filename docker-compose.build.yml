# Docker Compose Build Configuration
# This file shows how to build custom services locally
# Use with: docker compose -f docker-compose.build.yml up

services:
  # Optional: Build api-gateway from source
  api-gateway:
    build:
      context: ./deployments/base/api-gateway
      dockerfile: Dockerfile
      args:
        NODE_VERSION: "22-alpine"
      # buildx options for multi-platform builds
      # platforms:
      #   - linux/amd64
      #   - linux/arm64
    image: mini-baas/api-gateway:latest
    ports:
      - "3000:3000"
    networks:
      - mini-baas
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      # Add your environment variables here
    restart: unless-stopped

  # Optional: Build auth-service from source
  auth-service:
    build:
      context: ./deployments/base/auth-service
      dockerfile: Dockerfile
    image: mini-baas/auth-service:latest
    ports:
      - "8001:8000"
    networks:
      - mini-baas
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
    restart: unless-stopped

  # Optional: Build dynamic-api from source
  dynamic-api:
    build:
      context: ./deployments/base/dynamic-api
      dockerfile: Dockerfile
    image: mini-baas/dynamic-api:latest
    ports:
      - "8002:8080"
    networks:
      - mini-baas
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Optional: Build schema-service from source
  schema-service:
    build:
      context: ./deployments/base/schema-service
      dockerfile: Dockerfile
    image: mini-baas/schema-service:latest
    ports:
      - "3001:3001"
    networks:
      - mini-baas
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Infrastructure services (prebuilt images)
  postgres:
    image: postgres:16-alpine
    container_name: mini-baas-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mini-baas
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: mini-baas-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - mini-baas
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: mini-baas-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - mini-baas
    restart: unless-stopped

networks:
  mini-baas:
    driver: bridge

volumes:
  minio-data:
  redis-data:
  postgres-data:
