apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamic-api
  labels:
    app: dynamic-api
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dynamic-api
  template:
    metadata:
      labels:
        app: dynamic-api
        component: api
    spec:
      containers:
      - name: dynamic-api
        image: mini-baas/dynamic-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: dynamic-api
  labels:
    app: dynamic-api
spec:
  selector:
    app: dynamic-api
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
