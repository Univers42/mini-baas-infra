apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

labels:
  - pairs:
      app.mini-baas/managed-by: kustomize
      app.mini-baas/version: v1

resources:
  - api-gateway/deployment.yaml
  - auth-service/deployment.yaml
  - dynamic-api/deployment.yaml
  - schema-service/deployment.yaml

images:
  - name: mini-baas/api-gateway
    newTag: latest
  - name: mini-baas/auth-service
    newTag: latest
  - name: mini-baas/dynamic-api
    newTag: latest
  - name: mini-baas/schema-service
    newTag: latest
