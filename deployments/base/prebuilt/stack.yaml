apiVersion: v1
kind: Secret
metadata:
  name: mini-baas-secrets
  labels:
    app.kubernetes.io/part-of: mini-baas-prebuilt
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: postgres
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/postgres
  PGRST_DB_URI: postgres://postgres:postgres@postgres:5432/postgres
  JWT_SECRET: super-secret-jwt-token-with-at-least-32-chars
  SECRET_KEY_BASE: super-secret-key-base
  METRICS_JWT_SECRET: super-secret-jwt-token-with-at-least-32-chars
  ANON_KEY: anon-key-placeholder
  SERVICE_ROLE_KEY: service-key-placeholder
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin
  VAULT_ENC_KEY: 0123456789abcdef0123456789abcdef
  REALTIME_DB_NAME: realtime
  REALTIME_DASHBOARD_USER: supabase
  REALTIME_DASHBOARD_PASSWORD: this_is_insecure_change_me
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  labels:
    app.kubernetes.io/part-of: mini-baas-prebuilt
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    services:
      - name: gotrue
        url: http://gotrue:9999
        routes:
          - name: gotrue-route
            paths:
              - /auth
            strip_path: true

      - name: postgrest
        url: http://postgrest:3000
        routes:
          - name: postgrest-route
            paths:
              - /rest
            strip_path: true

      - name: realtime
        url: http://realtime:4000
        routes:
          - name: realtime-route
            paths:
              - /realtime
            strip_path: true

      - name: trino
        url: http://trino:8080
        routes:
          - name: trino-route
            paths:
              - /sql
            strip_path: true

      - name: studio
        url: http://studio:3000
        routes:
          - name: studio-route
            paths:
              - /studio
            strip_path: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
    app.kubernetes.io/part-of: mini-baas-prebuilt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/part-of: mini-baas-prebuilt
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: POSTGRES_DB
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: postgres
    app.kubernetes.io/part-of: mini-baas-prebuilt
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
