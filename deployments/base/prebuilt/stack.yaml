apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotrue
  labels:
    app: gotrue
    app.kubernetes.io/part-of: mini-baas-prebuilt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gotrue
  template:
    metadata:
      labels:
        app: gotrue
        app.kubernetes.io/part-of: mini-baas-prebuilt
    spec:
      initContainers:
        - name: init-auth-schema
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: postgres
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: POSTGRES_DB
          command:
            - sh
            - -ec
            - |
              until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; do sleep 2; done
              psql -v ON_ERROR_STOP=1 -c 'CREATE SCHEMA IF NOT EXISTS auth;'
      containers:
        - name: gotrue
          image: supabase/gotrue:v2.188.1
          ports:
            - containerPort: 9999
          env:
            - name: GOTRUE_API_HOST
              value: 0.0.0.0
            - name: GOTRUE_API_PORT
              value: "9999"
            - name: API_EXTERNAL_URL
              value: http://localhost:9999
            - name: GOTRUE_SITE_URL
              value: http://localhost:3001
            - name: GOTRUE_DB_DRIVER
              value: postgres
            - name: GOTRUE_DB_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: DATABASE_URL
            - name: GOTRUE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: gotrue
  labels:
    app: gotrue
    app.kubernetes.io/part-of: mini-baas-prebuilt
spec:
  selector:
    app: gotrue
  ports:
    - name: http
      port: 9999
      targetPort: 9999
---
