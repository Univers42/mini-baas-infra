apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime
  labels:
    app: realtime
    app.kubernetes.io/part-of: mini-baas-prebuilt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: realtime
  template:
    metadata:
      labels:
        app: realtime
        app.kubernetes.io/part-of: mini-baas-prebuilt
    spec:
      initContainers:
        - name: init-realtime-db
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: postgres
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: POSTGRES_DB
            - name: REALTIME_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: REALTIME_DB_NAME
          command:
            - sh
            - -ec
            - |
              until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; do sleep 2; done
              psql -v ON_ERROR_STOP=1 -d "$PGDATABASE" -tc "SELECT 1 FROM pg_database WHERE datname='${REALTIME_DB_NAME}'" | grep -q 1 || \
              psql -v ON_ERROR_STOP=1 -d "$PGDATABASE" -c "CREATE DATABASE \"${REALTIME_DB_NAME}\";"
      containers:
        - name: realtime
          image: supabase/realtime
          ports:
            - containerPort: 4000
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: REALTIME_DB_NAME
            - name: PORT
              value: "4000"
            - name: APP_NAME
              value: realtime-dev
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: SECRET_KEY_BASE
            - name: METRICS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: METRICS_JWT_SECRET
            - name: API_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: JWT_SECRET
            - name: DASHBOARD_USER
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: REALTIME_DASHBOARD_USER
            - name: DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mini-baas-secrets
                  key: REALTIME_DASHBOARD_PASSWORD
            - name: ERL_AFLAGS
              value: -proto_dist inet_tcp
---
apiVersion: v1
kind: Service
metadata:
  name: realtime
  labels:
    app: realtime
    app.kubernetes.io/part-of: mini-baas-prebuilt
spec:
  selector:
    app: realtime
  ports:
    - name: http
      port: 4000
      targetPort: 4000
