apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-service
  labels:
    app: schema-service
    component: schema
spec:
  replicas: 1
  selector:
    matchLabels:
      app: schema-service
  template:
    metadata:
      labels:
        app: schema-service
        component: schema
    spec:
      containers:
      - name: schema-service
        image: mini-baas/schema-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        - name: MONGODB_URI
          value: "mongodb://mongo:27017"
        - name: MONGODB_DATABASE
          value: "mini_baas"
        - name: MONGODB_COLLECTION
          value: "schema_catalog"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: schema-service
  labels:
    app: schema-service
spec:
  selector:
    app: schema-service
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: http
