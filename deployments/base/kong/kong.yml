# ! Action plan
_format_version: "3.0"
_transform: true

services:
  - name: auth
    url: http://gotrue:9999
    routes:
      - name: auth-routes
        paths: [/auth/v1]
        strip_path: true
  - name: rest
    url: http://postgrest:3000
    routes:
      - name: rest-routes
        paths: [/rest/v1]
        strip_path: true

  - name: realtime
    url: http://realtime:4000
    routes:
      - name: realtime-routes
        paths: [/realtime/v1]
        strip_path: true
        protocols: [http, https]

  - name: storage
    url: http://minio:9000
    routes:
      - name: storage-routes
        paths: [/storage/v1]
        strip_path: true

plugins:
  - name: cors
    config:
      origins: ["*"]
      methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      headers: [Authorization, Content-Type, apikey, x-client-info]
      credentials: true
