apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

resources:
  - ../../base

patches:
  - path: api-gateway-service-nodeport.yaml
  - path: db-hosts-patch.yaml

namePrefix: local-

labels:
  - pairs:
      environment: local
      tier: development

images:
  - name: mini-baas/api-gateway
    newTag: latest
  - name: mini-baas/auth-service
    newTag: latest
  - name: mini-baas/dynamic-api
    newTag: latest
  - name: mini-baas/schema-service
    newTag: latest
