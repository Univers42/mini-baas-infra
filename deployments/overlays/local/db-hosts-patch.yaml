apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  template:
    spec:
      containers:
      - name: auth-service
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres@local-postgres:5432/postgres"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamic-api
spec:
  template:
    spec:
      containers:
      - name: dynamic-api
        env:
        - name: DB_DSN
          value: "postgres://postgres:postgres@local-postgres:5432/postgres"