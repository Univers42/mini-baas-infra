apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mini-baas-production

bases:
  - ../../base

namePrefix: prod-

commonLabels:
  environment: production
  tier: production

images:
  - name: mini-baas/api-gateway
    newTag: v1.0.0
  - name: mini-baas/auth-service
    newTag: v1.0.0
  - name: mini-baas/dynamic-api
    newTag: v1.0.0
  - name: mini-baas/schema-service
    newTag: v1.0.0
