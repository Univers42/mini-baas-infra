apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mini-baas-staging

resources:
  - ../../base

namePrefix: staging-

labels:
  - pairs:
      environment: staging
      tier: pre-production

images:
  - name: mini-baas/api-gateway
    newTag: staging-latest
  - name: mini-baas/auth-service
    newTag: staging-latest
  - name: mini-baas/dynamic-api
    newTag: staging-latest
  - name: mini-baas/schema-service
    newTag: staging-latest
