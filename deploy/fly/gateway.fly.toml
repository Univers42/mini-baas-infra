primary_region = "cdg"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "deploy/fly/gateway.Dockerfile"

[env]
  KONG_DATABASE = "off"
  KONG_DECLARATIVE_CONFIG = "/tmp/kong.yml"
  KONG_ADMIN_LISTEN = "0.0.0.0:8001"
  KONG_NGINX_WORKER_PROCESSES = "1"
  KONG_MEM_CACHE_SIZE = "64m"
  API_EXTERNAL_URL = "https://api.example.com/auth/v1"
  KONG_CORS_ORIGIN_APP = "https://app.example.com"
  KONG_CORS_ORIGIN_PLAYGROUND = "https://playground.example.com"
  KONG_CORS_ORIGIN_STUDIO = "https://studio.example.com"
  KONG_CORS_ORIGIN_FRONTEND = "https://frontend.example.com"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 2
  processes = ["app"]

[checks.proxy]
  type = "tcp"
  port = 8000
  interval = "15s"
  timeout = "3s"
  grace_period = "30s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
