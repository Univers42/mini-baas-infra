primary_region = "cdg"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "src/Dockerfile"
  [build.args]
    APP = "newsletter-service"

[env]
  PORT = "3090"
  EMAIL_SERVICE_URL = "http://mini-baas-email-service.internal:3030"
  NEWSLETTER_BATCH_SIZE = "5"
  LOG_LEVEL = "info"

[checks.live]
  type = "http"
  port = 3090
  method = "GET"
  path = "/health/live"
  interval = "15s"
  timeout = "3s"
  grace_period = "30s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
