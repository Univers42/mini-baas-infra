primary_region = "cdg"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "src/Dockerfile"
  [build.args]
    APP = "ai-service"

[env]
  PORT = "3100"
  MONGO_DB_NAME = "mini_baas_ai"
  LLM_API_URL = "https://api.groq.com/openai/v1"
  LLM_MODEL = "llama-3.3-70b-versatile"
  LLM_MAX_TOKENS = "2048"
  LLM_TEMPERATURE = "0.7"
  AI_CONVERSATION_TTL_HOURS = "24"
  LOG_LEVEL = "info"

[checks.live]
  type = "http"
  port = 3100
  method = "GET"
  path = "/health/live"
  interval = "15s"
  timeout = "3s"
  grace_period = "30s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
