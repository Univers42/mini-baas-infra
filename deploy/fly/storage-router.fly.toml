primary_region = "cdg"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "src/Dockerfile"
  [build.args]
    APP = "storage-router"

[env]
  PORT = "3040"
  S3_REGION = "us-east-1"
  PRESIGN_EXPIRES_SECONDS = "3600"
  LOG_LEVEL = "info"

[checks.live]
  type = "http"
  port = 3040
  method = "GET"
  path = "/health/live"
  interval = "15s"
  timeout = "3s"
  grace_period = "30s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
