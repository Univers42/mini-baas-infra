primary_region = "cdg"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "src/Dockerfile"
  [build.args]
    APP = "log-service"

[env]
  PORT = "3110"
  LOG_BUFFER_SIZE = "1000"
  LOG_LEVEL = "info"

[checks.live]
  type = "http"
  port = 3110
  method = "GET"
  path = "/health/live"
  interval = "15s"
  timeout = "3s"
  grace_period = "30s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
