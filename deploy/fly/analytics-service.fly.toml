primary_region = "cdg"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "src/Dockerfile"
  [build.args]
    APP = "analytics-service"

[env]
  PORT = "3070"
  MONGO_DB_NAME = "mini_baas_analytics"
  ANALYTICS_RETENTION_DAYS = "90"
  LOG_LEVEL = "info"

[checks.live]
  type = "http"
  port = 3070
  method = "GET"
  path = "/health/live"
  interval = "15s"
  timeout = "3s"
  grace_period = "30s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
