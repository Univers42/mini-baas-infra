primary_region = "cdg"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "src/Dockerfile"
  [build.args]
    APP = "email-service"

[env]
  PORT = "3030"
  SMTP_SECURE = "false"
  EMAIL_FROM = "noreply@example.com"
  LOG_LEVEL = "info"

[checks.live]
  type = "http"
  port = 3030
  method = "GET"
  path = "/health/live"
  interval = "15s"
  timeout = "3s"
  grace_period = "30s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
