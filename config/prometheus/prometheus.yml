# File: config/prometheus/prometheus.yml
# Prometheus scrape configuration for mini-BaaS
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'kong'
    static_configs:
      - targets: ['kong:8001']
    metrics_path: /metrics

  - job_name: 'mongo-api'
    static_configs:
      - targets: ['mongo-api:3010']
    metrics_path: /metrics

  - job_name: 'adapter-registry'
    static_configs:
      - targets: ['adapter-registry:3020']
    metrics_path: /metrics

  - job_name: 'query-router'
    static_configs:
      - targets: ['query-router:4001']
    metrics_path: /metrics

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres:5432']
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
