# mini-baas-infra global configuration
# Missing keys are intentionally safe: docker-compose.yml defaults still apply.

[global]
ENV = development
LOG_LEVEL = info
BASE_DOMAIN = localhost
API_EXTERNAL_URL = http://localhost:8000
FRONTEND_URL = http://localhost:4321

[ports]
# Public entrypoint. Frontends and SDKs should use Kong only.
KONG_HTTP_PORT = 8000
# Admin access is bound to localhost by compose.
KONG_ADMIN_PORT = 8001
# Optional direct local admin access to Postgres. Use a non-default port to
# avoid conflicts with a host Postgres installation.
PG_PORT = 55432
# Internal-only services are not exposed in the track-binocle compose profile.
REDIS_PORT = 6379
PG_META_PORT = 8080
SUPAVISOR_PORT = 5432
POSTGREST_PORT = 3000
GOTRUE_PORT = 9999
STORAGE_PORT = 9000
REALTIME_PORT = 4000
